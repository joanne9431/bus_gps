<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巴士簡易報時板 + GPS搜尋</title>
    <style>
        :root {
            --primary-color: #E11B22;
            --text-color: #2b303a;
            --text-muted: #70757a;
            --bg-color: #f8f9fa;
            --border-color: #e9ecef;
            --now-color: #dc3545;
            --soon-color: #fd7e14;
            --later-color: #198754;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 12px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); padding: 16px; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border-color); }
        header h1 { font-size: 1.1rem; color: var(--text-color); }
        .refresh-text { font-size: 0.75rem; color: var(--text-muted); }
        .btn-refresh { background: none; border: none; color: var(--primary-color); font-size: 0.75rem; font-weight: bold; cursor: pointer; margin-left: 8px; }

        /* 搜尋與GPS狀態欄 */
        .search-box { width: 100%; margin-bottom: 6px; }
        .search-input { width: 100%; padding: 8px 12px; font-size: 0.9rem; border: 1px solid #ced4da; border-radius: 6px; outline: none; }
        .search-input:focus { border-color: var(--primary-color); }
        .gps-status { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 12px; padding: 0 4px; display: flex; justify-content: space-between;}

        .route-card { border-bottom: 1px solid var(--border-color); padding: 10px 0; }
        .route-card:last-child { border-bottom: none; }
        
        .route-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 0.85rem; }
        .route-info { font-weight: bold; }
        .route-num { color: var(--primary-color); font-size: 1.1rem; font-weight: 900; margin-right: 6px; }
        .stop-tag { color: var(--text-muted); font-size: 0.75rem; background: #f1f3f5; padding: 1px 6px; border-radius: 4px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .eta-list { display: flex; flex-direction: column; gap: 4px; }
        .eta-item { display: flex; justify-content: space-between; font-size: 0.85rem; color: #4a5056; }
        
        .countdown { font-weight: bold; min-width: 65px; text-align: right; }
        .t-now { color: var(--now-color); animation: blink 1.5s infinite; }
        .t-soon { color: var(--soon-color); }
        .t-later { color: var(--later-color); }

        @keyframes blink { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        .no-data { text-align: center; color: var(--text-muted); font-size: 0.8rem; padding: 8px 0; }
        .loader { text-align: center; color: var(--text-muted); font-size: 0.85rem; padding: 20px 0; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🚌 巴士動態看板</h1>
        <div class="refresh-text">
            <span id="updateTime">--:--</span> (<span id="countdownText">30s</span>)
            <button class="btn-refresh" id="manualRefreshBtn">更新</button>
        </div>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="輸入路線篩選，或利用 GPS 搜尋附近新路線...">
    </div>
    <div class="gps-status">
        <span id="gpsText">📍 正在獲取 GPS 定位...</span>
        <span id="dbText">💾 載入車站數據中...</span>
    </div>

    <div id="dashboardArea">
        <div class="loader">正在初始化系統...</div>
    </div>
</div>

<script>
    // ⚙️ 常用路線清單
    const MY_ROUTES_CONFIG = [
        { route: "215X", direction: "往 藍田(廣田邨)總站", stop_id: "48184733EFE9D3E3", stop_name: "尖沙咀麼地道" },
        { route: "14X", direction: "往 油塘", stop_id: "C175ACB534E8C15C", stop_name: "尖沙咀麼地道" },
        { route: "98A", direction: "往 坑口(北)", stop_id: "3F9AE21DC3A540B9", stop_name: "牛頭角站" },
        { route: "95M", direction: "往 翠林", stop_id: "00A529823BEBABA7", stop_name: "觀塘（雅麗道）總站" },
        { route: "95", direction: "往 翠林", stop_id: "C91C122CFC3FF66B", stop_name: "佐敦炮台街" }
    ];

    let countdownInterval;
    let secondsLeft = 30;
    let globalEtaMap = new Map(); 
    let allStopsDatabase = []; // 儲存全港九巴車站坐標
    let userLocation = null;   // 儲存使用者 GPS 坐標

    const dashboardArea = document.getElementById('dashboardArea');
    const updateTimeSpan = document.getElementById('updateTime');
    const countdownTextSpan = document.getElementById('countdownText');
    const manualRefreshBtn = document.getElementById('manualRefreshBtn');
    const searchInput = document.getElementById('searchInput');
    const gpsText = document.getElementById('gpsText');
    const dbText = document.getElementById('dbText');

    // 計算兩個經緯度之間的距離 (單位: 公尺)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3;
        const phi1 = lat1 * Math.PI / 180;
        const phi2 = lat2 * Math.PI / 180;
        const deltaPhi = (lat2 - lat1) * Math.PI / 180;
        const deltaLambda = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(deltaPhi/2) * Math.sin(deltaPhi/2) +
                  Math.cos(phi1) * Math.cos(phi2) *
                  Math.sin(deltaLambda/2) * Math.sin(deltaLambda/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    // 獲取手機 GPS 定位
    function initGPS() {
        if (navigator.geolocation) {
            navigator.geolocation.watchPosition(
                (position) => {
                    userLocation = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                    gpsText.innerText = `📍 定位成功 (誤差: ${Math.round(position.coords.accuracy)}m)`;
                },
                (err) => {
                    gpsText.innerText = `❌ 定位失敗: 權限不足或未開啟 GPS`;
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        } else {
            gpsText.innerText = `❌ 瀏覽器不支援 GPS`;
        }
    }

    // 載入全香港九巴車站數據庫
    async function initStopsDatabase() {
        try {
            const res = await fetch('https://data.etabus.gov.hk/v1/transport/kmb/stop');[cite: 1]
            if(res.ok) {
                const json = await res.json();
                allStopsDatabase = json.data || [];
                dbText.innerText = `💾 數據庫已就緒 (${allStopsDatabase.length} 站)`;[cite: 1]
            }
        } catch {
            dbText.innerText = `❌ 無法載入車站資料`;
        }
    }

    function calculateMins(etaString) {
        if (!etaString) return null;
        const now = new Date();
        const etaTime = new Date(etaString);
        const diffMins = Math.max(0, Math.floor((etaTime - now) / 1000 / 60));
        const formattedTime = etaTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
        return { mins: diffMins, timeString: formattedTime };
    }

    // 核心渲染邏輯
    async function renderDashboard(filterQuery = "") {
        const query = filterQuery.trim().toUpperCase();
        let html = '';

        const isQueryInConfig = MY_ROUTES_CONFIG.some(c => c.route.toUpperCase() === query);

        // 情境 A：顯示首頁或常用清單篩選
        if (!query || isQueryInConfig) {
            MY_ROUTES_CONFIG.forEach(cfg => {
                if (query && cfg.route.toUpperCase() !== query) return;
                const allEta = globalEtaMap.get(cfg.stop_id) || [];
                let routeEtas = allEta.filter(item => item.route === cfg.route && item.eta);
                html += generateRouteCardHtml(cfg, routeEtas);
            });
            dashboardArea.innerHTML = html;
        } 
        // 情境 B：使用者搜尋了「全新路線」
        else {
            dashboardArea.innerHTML = `<div class="loader">正在尋找距離最近的 ${query} 號公車站...</div>`;
            
            // 1. 尋找全港所有會停靠此搜尋路線的車站
            let matchedStops = [];
            try {
                const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/route-stop`);
                if(res.ok) {
                    const json = await res.json();
                    // 過濾出該路線的所有站點代碼
                    const stopIdsForRoute = json.data
                        .filter(item => item.route === query)
                        .map(item => item.stop);

                    // 與全局數據庫比對，抓出經緯度
                    matchedStops = allStopsDatabase.filter(stop => stopIdsForRoute.includes(stop.stop));[cite: 1]
                }
            } catch {}

            // 2. 如果有 GPS 且找到了站點，計算誰最近
            if (userLocation && matchedStops.length > 0) {
                matchedStops.forEach(stop => {
                    stop.distance = getDistance(userLocation.lat, userLocation.lng, parseFloat(stop.lat), parseFloat(stop.long));
                });
                // 按距離由近到遠排序
                matchedStops.sort((a, b) => a.distance - b.distance);
                
                const nearestStop = matchedStops[0];
                const distanceText = nearestStop.distance > 1000 ? `${(nearestStop.distance/1000).toFixed(1)}km` : `${Math.round(nearestStop.distance)}m`;

                // 3. 向 API 請求這個最近車站的即時預報
                try {
                    const etaRes = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${nearestStop.stop}`);
                    if(etaRes.ok) {
                        const etaJson = await etaRes.json();
                        let routeEtas = (etaJson.data || []).filter(item => item.route === query && item.eta);
                        
                        const tempCfg = {
                            route: query,
                            direction: routeEtas.length > 0 ? `往 ${routeEtas[0].dest_tc}` : "未知方向",
                            stop_name: `${nearestStop.name_tc} (${distanceText})`
                        };
                        html += generateRouteCardHtml(tempCfg, routeEtas);
                    }
                } catch {}
            } else if (!userLocation) {
                html = `<div class="no-data">請開啟 GPS 定位才能為你尋找最近的 "${query}" 車站</div>`;
            } else {
                html = `<div class="no-data">找不到 "${query}" 路線，請確認號碼是否正確</div>`;
            }
            
            dashboardArea.innerHTML = html;
        }
    }

    function generateRouteCardHtml(cfg, routeEtas) {
        routeEtas.sort((a, b) => new Date(a.eta) - new Date(b.eta));
        const nextTwo = routeEtas.slice(0, 2);

        let cardHtml = `
            <div class="route-card">
                <div class="route-meta">
                    <div class="route-info"><span class="route-num">${cfg.route}</span>${cfg.direction}</div>
                    <span class="stop-tag">📍 ${cfg.stop_name}</span>
                </div>
                <div class="eta-list">
        `;

        if (nextTwo.length === 0) {
            cardHtml += `<div class="no-data">暫無班次</div>`;
        } else {
            nextTwo.forEach(item => {
                const timeInfo = calculateMins(item.eta);
                if (!timeInfo) return;

                let styleClass = 't-later';
                let label = `${timeInfo.mins} 分鐘`;

                if (timeInfo.mins === 0) { styleClass = 't-now'; label = '即將到站'; }
                else if (timeInfo.mins <= 4) { styleClass = 't-soon'; }

                cardHtml += `
                    <div class="eta-item">
                        <span>預算 ${timeInfo.timeString}</span>
                        <span class="countdown ${styleClass}">${label}</span>
                    </div>
                `;
            });
        }
        cardHtml += `</div></div>`;
        return cardHtml;
    }

    async function updateDashboard() {
        // 如果目前正在查詢清單外的新路線，暫停常用清單的背景刷新以免覆蓋畫面
        const query = searchInput.value.trim().toUpperCase();
        const isQueryInConfig = MY_ROUTES_CONFIG.some(c => c.route.toUpperCase() === query);
        
        if (query && !isQueryInConfig) {
            renderDashboard(searchInput.value);
            resetTimer();
            return;
        }

        try {
            const uniqueStopIds = [...new Set(MY_ROUTES_CONFIG.map(cfg => cfg.stop_id))];
            const fetchPromises = uniqueStopIds.map(async (id) => {
                try {
                    const res = await fetch(`https://data.etabus.gov.hk/v1/transport/kmb/stop-eta/${id}`);
                    return { id, data: res.ok ? (await res.json()).data : [] };
                } catch { return { id, data: [] }; }
            });

            const results = await Promise.all(fetchPromises);
            globalEtaMap = new Map(results.map(r => [r.id, r.data]));

            renderDashboard(searchInput.value);

            updateTimeSpan.innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
            resetTimer();
        } catch (e) {
            dashboardArea.innerHTML = `<div class="no-data">更新失敗: ${e.message}</div>`;
        }
    }

    function resetTimer() {
        clearInterval(countdownInterval);
        secondsLeft = 30;
        countdownTextSpan.innerText = `${secondsLeft}s`;
        countdownInterval = setInterval(() => {
            secondsLeft--;
            if (secondsLeft <= 0) { updateDashboard(); } 
            else { countdownTextSpan.innerText = `${secondsLeft}s`; }
        }, 1000);
    }

    // 當使用者輸入停止時才發送網路請求 (防抖延遲 500ms)
    let searchTimeout;
    searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            renderDashboard(e.target.value);
        }, 500);
    });

    manualRefreshBtn.addEventListener('click', updateDashboard);
    
    // 初始化啟動
    initGPS();
    initStopsDatabase().then(() => {
        updateDashboard();
    });
</script>

</body>
</html>
